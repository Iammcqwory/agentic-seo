<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        .nav { background: #333; color: #fff; padding: 10px; }
        .nav a { color: #fff; margin-right: 15px; text-decoration: none; }
        .footer { background: #333; color: #fff; padding: 20px; }
        .footer a { color: #ccc; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/pricing">Pricing</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/blog">Blog</a>
        <a href="/careers">Careers</a>
        <a href="/support">Support</a>
    </div>

    <div id="root"></div>

    <script>
        // SPA application - content rendered client-side
        document.addEventListener('DOMContentLoaded', function() {
            var root = document.getElementById('root');
            root.innerHTML = '<div class="page">' +
                '<h1>API Reference</h1>' +
                '<h4>Authentication</h4>' +
                '<div>Use Bearer tokens for auth. Send your token in the Authorization header.</div>' +
                '<h2>Endpoints</h2>' +
                '<div>POST /api/v1/users - Create a user</div>' +
                '<div>GET /api/v1/users/:id - Get a user</div>' +
                '<div>PUT /api/v1/users/:id - Update a user</div>' +
                '<div>DELETE /api/v1/users/:id - Delete a user</div>' +
                '<h4>Rate Limiting</h4>' +
                '<div>You are limited to 100 requests per minute. If you exceed this limit you will receive a 429 status code.</div>' +
                '<h2>Errors</h2>' +
                '<div>400 Bad Request - Invalid input</div>' +
                '<div>401 Unauthorized - Missing or invalid token</div>' +
                '<div>404 Not Found - Resource does not exist</div>' +
                '<div>500 Internal Server Error - Something went wrong</div>' +
            '</div>';
        });
    </script>

    <noscript>
        <div>This page requires JavaScript to display content.</div>
    </noscript>

    <div class="footer">
        <div>
            <a href="/terms">Terms</a>
            <a href="/privacy">Privacy</a>
            <a href="/cookies">Cookies</a>
            <a href="/sitemap">Sitemap</a>
        </div>
        <div>
            <a href="https://twitter.com/example">Twitter</a>
            <a href="https://facebook.com/example">Facebook</a>
            <a href="https://linkedin.com/example">LinkedIn</a>
            <a href="https://github.com/example">GitHub</a>
        </div>
        <div>
            <p>Copyright 2024 Example Corp. All rights reserved.</p>
            <p>123 Main Street, Suite 100, San Francisco, CA 94105</p>
        </div>
    </div>
</body>
</html>
